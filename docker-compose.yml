version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: iconstruct-postgres
    environment:
      POSTGRES_DB: iconstruct
      POSTGRES_USER: iconstruct
      POSTGRES_PASSWORD: iconstruct
    ports:
      - "5433:5432"  # Using 5433 to avoid conflict with other projects
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iconstruct"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: iconstruct-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/iconstruct
      SPRING_DATASOURCE_USERNAME: iconstruct
      SPRING_DATASOURCE_PASSWORD: iconstruct
      JWT_SECRET: ${JWT_SECRET:-iconstruct-jwt-secret-change-in-production-min-32-chars}
    ports:
      - "8081:8080"  # Using 8081 to avoid conflict
    depends_on:
      postgres:
        condition: service_healthy

  frontend-web:
    build: ./frontend-web
    container_name: iconstruct-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
    ports:
      - "3001:3000"  # Using 3001 to avoid conflict
    depends_on:
      - backend

volumes:
  postgres_data:
