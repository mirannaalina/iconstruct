spring:
  application:
    name: iconstruct-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/iconstruct}
    username: ${SPRING_DATASOURCE_USERNAME:iconstruct}
    password: ${SPRING_DATASOURCE_PASSWORD:iconstruct}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:iconstruct-super-secret-jwt-key-change-in-production-minimum-32-characters}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:iconstruct-uploads}
    region: ${AWS_REGION:eu-central-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-credentials.json}

platform:
  commission:
    repair-percentage: ${REPAIR_COMMISSION:5} # 5% commission on repairs

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.iconstruct: DEBUG
    org.springframework.security: INFO
